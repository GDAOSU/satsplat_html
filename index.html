<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SatSplat: 3D Satellite Reconstruction</title>
    <style>
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; color: white; -webkit-tap-highlight-color: transparent; }
        #header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; flex-direction: column; gap: 15px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 800; line-height: 1.2; }
        .subtitle { margin: 4px 0 0; font-size: 1rem; color: #aaa; }
        .workflow { margin-top: 5px; font-size: 0.9rem; color: #007aff; font-weight: 700; letter-spacing: 0.5px; }
        
        #site-selector {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 12px 18px; border-radius: 12px; font-size: 1rem; font-weight: 600; outline: none; cursor: pointer;
        }

        #nav-container {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; z-index: 100;
        }
        #nav-bar {
            display: flex; gap: 8px; background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 95%;
        }
        .nav-btn {
            position: relative; padding: 14px 20px; border: none; background: transparent;
            color: white; cursor: pointer; border-radius: 14px;
            font-weight: 700; font-size: 0.95rem; transition: all 0.2s; opacity: 0.3;
            overflow: hidden; flex: 1; white-space: nowrap;
            --progress: 0%;
        }
        .nav-btn::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            height: 4px; width: var(--progress); background: #007aff;
            transition: width 0.1s ease-out;
        }
        .nav-btn.active { background: rgba(255, 255, 255, 0.15); opacity: 1 !important; }
        #status-bar { font-size: 0.8rem; color: #666; font-weight: 700; letter-spacing: 1px; }
        canvas { display: block; width: 100vw; height: 100vh; }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; }
            .subtitle { font-size: 0.85rem; }
            .nav-btn { padding: 12px 15px; font-size: 0.85rem; }
            #site-selector { padding: 10px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="header-top">
            <div>
                <h1>3D Satellite Recon</h1>
                <p class="subtitle">Traditional to Modern Methods</p>
                <p class="workflow">ASP → SatSplat → Diffusion</p>
            </div>
            <select id="site-selector">
                <option value="068">JAX_068</option>
                <option value="214">JAX_214</option>
                <option value="251">JAX_251</option>
                <option value="260">JAX_260</option>
            </select>
        </div>
    </div>

    <div id="nav-container">
        <div id="nav-bar">
            <button id="btn-asp" class="nav-btn">ASP</button>
            <button id="btn-step1" class="nav-btn">SatSplat</button>
            <button id="btn-step2" class="nav-btn">Diffusion</button>
        </div>
        <div id="status-bar"><span id="status-text">CONNECTING...</span></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest";

        let renderer, camera, controls;
        let currentScene = null;
        let currentSite = "068";
        const scenes = {};
        const BASE_URL = "https://huggingface.co/datasets/jiyong1591/SatSplatDiffusion/resolve/main";

        function getUrl(site, type) {
            const suffix = type === "asp" ? "asp" : `${type}_baked`;
            return `${BASE_URL}/JAX_${site}_${suffix}.ply?download=true`;
        }

        function updateProgress(type, percent) {
            const btn = document.getElementById(`btn-${type}`);
            if (btn) btn.style.setProperty('--progress', `${percent}%`);
        }

        async function fetchWithProgress(url, type) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url);
                xhr.responseType = 'arraybuffer';
                xhr.onprogress = (e) => {
                    if (e.lengthComputable) updateProgress(type, (e.loaded / e.total) * 100);
                };
                xhr.onload = () => xhr.status === 200 ? resolve(xhr.response) : reject();
                xhr.onerror = reject;
                xhr.send();
            });
        }

        async function loadSingleModel(site, type) {
            const key = `${site}_${type}`;
            if (scenes[key]) return scenes[key];
            try {
                const buffer = await fetchWithProgress(getUrl(site, type), type);
                const scene = new SPLAT.Scene();
                const data = await SPLAT.LoaderUtils.ReadAsync(buffer);
                await SPLAT.PLYLoader.LoadAsync(data, scene);
                
                const obj = scene.objects[0];
                if (obj?.data?.positions) {
                    const pos = obj.data.positions;
                    let min = [Infinity, Infinity, Infinity], max = [-Infinity, -Infinity, -Infinity];
                    for (let i = 0; i < pos.length; i += 3) {
                        for (let j = 0; j < 3; j++) {
                            min[j] = Math.min(min[j], pos[i+j]);
                            max[j] = Math.max(max[j], pos[i+j]);
                        }
                    }
                    const center = min.map((v, i) => (v + max[i]) / 2);
                    for (let i = 0; i < pos.length; i += 3) {
                        for (let j = 0; j < 3; j++) pos[i+j] -= center[j];
                    }
                }
                obj.rotation = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(Math.PI / 2, 0, 0));
                scenes[key] = scene;
                return scene;
            } catch (err) {
                updateProgress(type, 0);
                return null;
            }
        }

        async function updateSite(site) {
            currentSite = site;
            document.getElementById("status-text").innerText = `SITE: ${site} LOADING...`;
            ["asp", "step1", "step2"].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.disabled = true;
                btn.style.opacity = "0.3";
                btn.style.setProperty('--progress', '0%');
                btn.classList.remove('active');
            });

            const firstScene = await loadSingleModel(site, "asp");
            if (firstScene && currentSite === site) {
                currentScene = firstScene;
                document.getElementById("btn-asp").classList.add('active');
                document.getElementById("btn-asp").disabled = false;
                document.getElementById("btn-asp").style.opacity = "1";
            }

            ["step1", "step2"].forEach(async (type) => {
                await loadSingleModel(site, type);
                if (currentSite === site) {
                    const btn = document.getElementById(`btn-${type}`);
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    if(type === "step2") document.getElementById("status-text").innerText = `SITE ${site} READY`;
                }
            });
        }

        const switchType = (type) => {
            const key = `${currentSite}_${type}`;
            if (!scenes[key]) return;
            currentScene = scenes[key];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
        };

        async function init() {
            const canvas = document.getElementById("mainCanvas");
            renderer = new SPLAT.WebGLRenderer(canvas);
            camera = new SPLAT.Camera();
            controls = new SPLAT.OrbitControls(camera, canvas);
            camera.position = new SPLAT.Vector3(2, -2, 2);
            
            window.addEventListener("resize", () => renderer.setSize(window.innerWidth, window.innerHeight));
            renderer.setSize(window.innerWidth, window.innerHeight);

            document.getElementById("site-selector").addEventListener("change", (e) => updateSite(e.target.value));
            document.getElementById("btn-asp").addEventListener("click", () => switchType("asp"));
            document.getElementById("btn-step1").addEventListener("click", () => switchType("step1"));
            document.getElementById("btn-step2").addEventListener("click", () => switchType("step2"));

            const frame = () => {
                controls.update();
                if (currentScene) renderer.render(currentScene, camera);
                requestAnimationFrame(frame);
            };
            requestAnimationFrame(frame);
            updateSite("068");
        }

        if (document.readyState === 'complete') init();
        else window.addEventListener('load', init);
    </script>
</body>
</html>
